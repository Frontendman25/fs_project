# Dedicated PostgreSQL for automated tests (isolated from dev DB).
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   copy .env.test.example to .env.test, run migrations, then npm test

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fs_backend_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
