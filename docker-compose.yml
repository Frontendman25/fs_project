# ─────────────────────────────────────────────────────────────────────────────
# Base docker-compose — shared service definitions.
# Do NOT use this file directly.
#
# Development:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Production (PostgreSQL):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --profile postgresql up -d
#
# Production (MongoDB):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --profile mongodb up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fs_project}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fs_project}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fs-network
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-fs_project} -d ${POSTGRES_DB:-fs_project}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-fs_project}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-fs_project}
    volumes:
      - mongodb_data:/data/db
    networks:
      - fs-network
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --eval
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # appendonly yes persists data to disk across restarts.
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-3100}:3100"
    environment:
      # ── Database selection ─────────────────────────────────────────────────
      DATABASE_TYPE: ${DATABASE_TYPE:-postgresql}
      DATABASE_TARGET: ${DATABASE_TARGET:-local}

      # Connection strings use Docker service names as hostnames.
      # Both are provided regardless of DATABASE_TYPE so that the app can
      # connect to whichever is selected without requiring container rebuilds.
      BACKEND_POSTGRESQL_URL: ${BACKEND_POSTGRESQL_URL:-}
      LOCAL_POSTGRESQL_URL: ${LOCAL_POSTGRESQL_URL:-postgresql://${POSTGRES_USER:-fs_project}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fs_project}}
      POSTGRESQL_URL: ${LOCAL_POSTGRESQL_URL:-postgresql://${POSTGRES_USER:-fs_project}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fs_project}}
      MONGODB_URI: >-
        mongodb://${MONGO_USER:-fs_project}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB:-fs_project}?authSource=admin

      # ── Cache ──────────────────────────────────────────────────────────────
      REDIS_URL: redis://redis:6379

      # ── App ────────────────────────────────────────────────────────────────
      PORT: ${PORT:-3100}
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # ── Auth ───────────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}

      # ── Storage ────────────────────────────────────────────────────────────
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      LOCAL_STORAGE_PATH: /app/uploads
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-uploads}

      # ── Logging ────────────────────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - fs-network
    depends_on:
      redis:
        condition: service_healthy

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3100}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    networks:
      - fs-network
    depends_on:
      - backend

# ─── Named Volumes ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  uploads_data:

# ─── Network ───────────────────────────────────────────────────────────────
networks:
  fs-network:
    driver: bridge
